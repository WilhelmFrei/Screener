name: 📡 Stock Screener — Scan quotidien

on:
  # Automatique chaque matin à 7h00 (heure Paris = 5h UTC)
  schedule:
    - cron: '0 5 * * 1-5'   # Lundi-Vendredi 7h Paris
    - cron: '0 7 * * 6'      # Samedi 9h Paris (marchés fermés, données J-1)

  # Déclenchement manuel depuis GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install yfinance pandas numpy

      - name: 🔍 Lancer le scan
        run: python generate.py

      - name: 📤 Publier les résultats
        run: |
          git config user.name "Screener Bot"
          git config user.email "bot@screener"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "📡 Scan du $(date '+%d/%m/%Y %H:%M')"
          git push
