<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 Stock Screener</title>
<style>
  body { background:#0a0e1a; color:#e2e8f0; font-family:system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .box { text-align:center; }
  .ico { font-size:56px; margin-bottom:16px; }
  h1 { font-family:monospace; font-size:24px; color:#00d4aa; margin-bottom:8px; }
  p { color:#64748b; font-size:14px; line-height:1.6; }
  .spinner { width:36px; height:36px; border:3px solid #1e2d45; border-top-color:#00d4aa;
    border-radius:50%; animation:spin .8s linear infinite; margin:20px auto 0; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="ico">📡</div>
    <h1>STOCK SCREENER</h1>
    <p>Premier scan en cours...<br>Revenez dans quelques minutes.</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
